<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Codicus Publicationes Medium HTML per Claude Haiku 4.5</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background: #f9f9f9;
        }
        
        .container {
            background: white;
            border-radius: 8px;
            padding: 30px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        h1 {
            color: #333;
            margin-bottom: 30px;
        }
        
        .articles-list {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }
        
        .article {
            border-bottom: 1px solid #e0e0e0;
            padding-bottom: 24px;
        }
        
        .article:last-child {
            border-bottom: none;
        }
        
        .article-title {
            font-size: 20px;
            font-weight: 600;
            margin: 0 0 12px 0;
            color: #333;
        }
        
        .article-title a {
            color: #1f73b7;
            text-decoration: none;
        }
        
        .article-title a:hover {
            text-decoration: underline;
        }
        
        .article-description {
            color: #666;
            font-size: 15px;
            line-height: 1.5;
            margin: 0 0 12px 0;
        }
        
        .article-meta {
            font-size: 13px;
            color: #999;
            display: flex;
            gap: 16px;
        }
        
        .article-date {
            display: flex;
            align-items: center;
        }
        
        .article-link {
            display: inline-block;
            margin-top: 12px;
            padding: 8px 16px;
            background: #1f73b7;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            font-size: 14px;
            transition: background 0.2s;
        }
        
        .article-link:hover {
            background: #0d47a1;
        }
        
        .loading {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }
        
        .error {
            background: #fee;
            color: #c33;
            padding: 20px;
            border-radius: 4px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Recent Articles</h1>
        <div id="articles" class="articles-list">
            <div class="loading">Loading articles...</div>
        </div>
    </div>

    <script>
        // Configuration
        const MEDIUM_RSS_URL = '/prensa/feed.xml'; // Replace with your Medium username
        const CORS_PROXY = ''; // Free CORS proxy
        const MAX_ARTICLES = 10;

        async function fetchMediumArticles() {
            const container = document.getElementById('articles');
            
            try {
                // Fetch the RSS feed through a CORS proxy
                const response = await fetch(MEDIUM_RSS_URL);
                
                if (!response.ok) {
                    throw new Error('Failed to fetch RSS feed');
                }
                
                const xmlText = await response.text();
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(xmlText, 'text/xml');
                
                // Check for parsing errors
                if (xmlDoc.getElementsByTagName('parsererror').length) {
                    throw new Error('Failed to parse RSS feed');
                }
                
                // Extract articles
                const items = xmlDoc.getElementsByTagName('item');
                const articles = [];
                
                for (let i = 0; i < Math.min(items.length, MAX_ARTICLES); i++) {
                    const item = items[i];
                    
                    const title = item.getElementsByTagName('title')[0]?.textContent || 'Untitled';
                    const link = item.getElementsByTagName('link')[0]?.textContent || '';
                    const pubDate = item.getElementsByTagName('pubDate')[0]?.textContent || '';
                    const description = item.getElementsByTagName('description')[0]?.textContent || '';
                    
                    // Clean up description (remove HTML tags)
                    const cleanDescription = description
                        .replace(/<[^>]*>/g, '')
                        .substring(0, 200)
                        .trim() + '...';
                    
                    articles.push({
                        title,
                        link,
                        pubDate,
                        description: cleanDescription
                    });
                }
                
                // Render articles
                if (articles.length === 0) {
                    container.innerHTML = '<div class="error">No articles found.</div>';
                    return;
                }
                
                container.innerHTML = articles.map(article => `
                    <div class="article">
                        <h2 class="article-title">
                            <a href="${article.link}" target="_blank" rel="noopener noreferrer">
                                ${escapeHtml(article.title)}
                            </a>
                        </h2>
                        <p class="article-description">${escapeHtml(article.description)}</p>
                        <div class="article-meta">
                            <span class="article-date">${formatDate(article.pubDate)}</span>
                        </div>
                        <a href="${article.link}" target="_blank" rel="noopener noreferrer" class="article-link">
                            Read on Medium
                        </a>
                    </div>
                `).join('');
                
            } catch (error) {
                console.error('Error fetching articles:', error);
                container.innerHTML = `
                    <div class="error">
                        <strong>Error loading articles:</strong> ${error.message}
                    </div>
                `;
            }
        }
        
        // Utility functions
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function formatDate(dateString) {
            const date = new Date(dateString);
            const options = { year: 'numeric', month: 'short', day: 'numeric' };
            return date.toLocaleDateString('en-US', options);
        }
        
        // Load articles on page load
        document.addEventListener('DOMContentLoaded', fetchMediumArticles);
    </script>
</body>
</html>

<p>Se recusa una depicción del mismo por la gravedad de las reclamaciones.</p><p>Se llama Ismael Gonzalez. La primera vez que le oí hablar, dijo a la mujer gerente, encargada de la junta, presentación anual del edificio, no hablar si no lo permitían el grupo de asistentes que como banda se habían organizado.</p><p>Que hombre sin clase y tacta, pensé. Ella poco participó en el resto de la junta, y la otra señorita, administradora, renunció ese día.</p><p>No fue esta la occasión que precipitó mi indagación. Caminando un día un poco después por un barrio con mi patineta deportiva,</p><p>Un carro frenó en seco, duro, y lentamente comenzó a habrirse la ventana del conductor. Era aquel individuo. “Ven aqui, tengo que decirte algo.” Seguí en mi camino, perplejo por su conducta típica de un pedofilio o matador serial. “Si tiene algo que decirme puede en el edificio!”</p><p>El personaje, hombre de 50–60 años, moreno, con una apariencia atipica educada y pelo blanco corto sin pintar, slim, es jefe de una empresa, y desde aquí es que se derrumban las noticias.</p><p>Tengo entendido por relato de victima anonima dicho modo operandi de este sujeto contra algunos de sus empleados, hombres jovenes, particularmente quienes dejaron la empresa contra su voluntad. Este siguiente anonimo en particular habla solo de su experiencia propia, sin decir saber nada de otras victimas.</p><p>Dice que lo secuestraron un día por calle con una especie de taxi de los de lujo, que tiene espacio arriero. Dice que el individuo Ismael Gonzalez estaba en la parte trasera donde lo colocaron. Dice que habían dos personas adicionales armadas en el frente del vehiculo. Dice que no fue cegado.</p><p>Dice que el accusado llevaba un electrocutador de mano, y que procedió a forzarse sexualmente sobre el, cuan también lo electrocutó tres veces.</p><p>Dice haber oido las voces fronteras complices aunciando el tiempo restante al individuo perpetrador, que parecían entender o mantener algun limite de tiempo para el crimen.</p><p>Dice que el accusado al fin con electrocutadora en mano, lleno de rabia, dijo, “Agradeceme por el trabajo que hicimos juntos.”</p><p>Personalmente, tal Ismael Gonzalez estaría enterado de mi investigación, actualmente habría según entiendo contratados siguiendome, ya que camino mucho, y planifica el mismo trato por esto y el ultraje que sintió en la junta.</p><p>Estos crimines y otros son típicos de los habitantes de la ciudad de Barranquilla y el municipio de Soledad, donde las noticias regularmente hablan de “Accesso carnal violento de menores de edad” en relación a personajes en libertad, como también de “Restos humanos desmembrados” regularmente encontrados en los pantanos bosques y cienagas de la costa.</p><p>Reportaje Leonardo Drake.</p><img src="https://medium.com/_/stat?event=post.clientViewed&referrerSource=full_rss&postId=d08aae30bd81" width="1" height="1" alt="">
